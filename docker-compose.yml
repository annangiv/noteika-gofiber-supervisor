services:
  app:
    build:
      context: .
    ports:
      - "8080:8080"
    env_file:
      - .env
    volumes:
      - ./data:/app/data
    depends_on:
      - embeddings
    restart: unless-stopped

  embeddings:
    build:
      context: ./embeddings
    ports:
      - "8001:8000"
    restart: unless-stopped
