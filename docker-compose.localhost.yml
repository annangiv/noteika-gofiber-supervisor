services:
  app:
    build:
      context: .
    container_name: noteika-go-app
    ports:
      - "8080:8080"
    networks:
      - noteika-network
    env_file:
      - .env
    volumes:
      - ./data:/app/data
    restart: unless-stopped

networks:
  noteika-network:
    driver: bridge
    name: noteika-net